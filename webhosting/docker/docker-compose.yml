services:
  # Django Web Service
  web:
    build:
      context: ../../ # Assuming your Dockerfile is in webhost/docker/
      dockerfile: webhosting/docker/Dockerfile
    container_name: django_app
    restart: unless-stopped
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ../../:/app # Mounting the entire project directory
      - ../../media:/app/media # Media files
      - ../../static:/app/static # Static files
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DEBUG=0
      - ALLOWED_HOSTS=*
    expose:
      - "8000" # Internal port for Nginx to connect
    networks:
      - webnet

  # Nginx Reverse Proxy
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80" # Expose HTTP for local testing
    volumes:
      - ../../webhosting/containers/nginx/nginx.conf:/etc/nginx/nginx.conf # Corrected path
      - ../../static:/static # Static files
      - ../../media:/media # Media files
    depends_on:
      - web
    networks:
      - webnet

  # Cloudflared Tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    volumes:
      - ../../webhosting/containers/cloudflared/config.yml:/etc/cloudflared/config.yml
      - ../../webhosting/containers/cloudflared/cert.pem:/etc/cloudflared/cert.pem
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - webnet

networks:
  webnet:
    driver: bridge
